<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MakoCode</title>
<!-- Google Fonts: Noto Sans SC + Dancing Script (花体字) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- KaTeX CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --vermilion: #C53B3B;
    --vermilion-dark: #9B2D2D;
    --gold: #D4A853;
    --gold-light: #E8C97A;
    --wood-dark: #2A1A0E;
    --wood: #3C2415;
    --wood-light: #5C3A22;
    --washi: #F5F0E8;
    --washi-dim: #D8CFC0;
    --washi-gold: #D4A853;
    --washi-white: #F5F0E8;
    --sakura: #F4C6C6;
    --sakura-dark: #E8B0B0;
    --sumi: #1A1410;
    --ink: rgba(26,20,16,0.7);
  }

  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden; height: 100vh; width: 100vw;
    background: var(--sumi); user-select: none;
  }

  #game-container {
    position: relative; width: 100vw; height: 100vh; overflow: hidden;
  }

  /* ===== 背景层 ===== */
  #bg-layer {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: background-image 1.5s ease;
  }
  #bg-layer::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.35);
  }

  /* ===== 樱花飘落 ===== */
  #sakura-container { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .petal {
    position: absolute; top: -40px;
    background: radial-gradient(ellipse, rgba(244,198,198,0.8) 0%, rgba(232,176,176,0.2) 100%);
    border-radius: 50% 0 50% 0;
    animation: fall var(--fall-dur) linear infinite;
    animation-delay: var(--delay);
    opacity: 0.6;
  }
  @keyframes fall {
    0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 0; }
    5% { opacity: 0.7; }
    50% { opacity: 0.5; }
    95% { opacity: 0.2; }
    100% { transform: translate(var(--drift),105vh) rotate(var(--spin)) scale(0.3); opacity: 0; }
  }

  /* ===== 角色立绘层 ===== */
  #character-layer {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 100vh; z-index: 8; pointer-events: none;
  }

  .char-sprite-wrap {
    position: absolute; bottom: 0;
    height: 85vh;
    transform-origin: bottom center;
    transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform, opacity;
  }
  .char-sprite-wrap img {
    height: 100%; width: auto; object-fit: contain;
    filter: drop-shadow(0 4px 30px rgba(0,0,0,0.4));
    transition: filter 0.7s;
  }

  /* 常态位置：茉子左、芳乃右 */
  .char-sprite-wrap.makoto { left: 4%; transform: scale(1); }
  .char-sprite-wrap.yoshino { left: 46%; transform: scale(1); }

  /* 茉子(Claude)居中说话 */
  .char-sprite-wrap.makoto.speaking {
    left: 50%; transform: translateX(-50%) scale(1.06);
    z-index: 10;
  }
  /* 芳乃(主人)居中说话 */
  .char-sprite-wrap.yoshino.speaking {
    left: 50%; transform: translateX(-50%) scale(1.06);
    z-index: 10;
  }

  /* 倾听者 */
  .char-sprite-wrap.makoto.listening {
    left: -4%; transform: scale(0.65);
    z-index: 6;
  }
  .char-sprite-wrap.makoto.listening img { filter: brightness(0.55) drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }

  .char-sprite-wrap.yoshino.listening {
    left: 60%; transform: scale(0.65);
    z-index: 6;
  }
  .char-sprite-wrap.yoshino.listening img { filter: brightness(0.55) drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }

  /* 思考中 / 空闲 — 两人归位 */
  .char-sprite-wrap.makoto.thinking {
    left: 4%; transform: scale(1);
    z-index: 7;
  }
  .char-sprite-wrap.yoshino.thinking {
    left: 46%; transform: scale(1);
    z-index: 7;
  }
  .char-sprite-wrap.thinking img { filter: drop-shadow(0 4px 30px rgba(0,0,0,0.4)); }

  /* ===== 思考气泡层 ===== */
  #think-bubble-layer {
    position: absolute; inset: 0; z-index: 25; pointer-events: none; overflow: hidden;
  }
  .think-bubble {
    position: absolute;
    max-width: 280px;
    background: rgba(42,26,14,0.92);
    backdrop-filter: blur(6px);
    border: 1.5px solid rgba(212,168,83,0.45);
    border-radius: 14px;
    padding: 9px 15px;
    color: rgba(245,240,232,0.9);
    font-size: 12.5px; line-height: 1.55; letter-spacing: 0.3px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(212,168,83,0.08), inset 0 1px 0 rgba(212,168,83,0.1);
    animation: bubbleRise 5.5s ease-out forwards;
    pointer-events: none;
    word-break: break-word;
  }
  .think-bubble::after {
    content: '';
    position: absolute; bottom: -6px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 10px; height: 10px;
    background: rgba(42,26,14,0.88);
    border-right: 1px solid rgba(212,168,83,0.3);
    border-bottom: 1px solid rgba(212,168,83,0.3);
  }
  .think-bubble.left-bubble::after { left: 18px; }
  .think-bubble.right-bubble::after { left: auto; right: 18px; }

  @keyframes bubbleRise {
    0%   { opacity: 0; transform: translateY(40px) scale(0.85); }
    6%   { opacity: 0.9; transform: translateY(0) scale(1); }
    60%  { opacity: 0.55; transform: translateY(-160px) scale(0.95); }
    100% { opacity: 0; transform: translateY(-300px) scale(0.8); }
  }

  /* ===== 对话层 ===== */
  #dialogue-layer {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 40px 16px; z-index: 20;
    background: linear-gradient(to top, rgba(26,20,16,0.97) 55%, rgba(26,20,16,0) 100%);
  }
  #dialogue-box {
    max-width: 920px; margin: 0 auto;
    background: linear-gradient(180deg, rgba(60,36,21,0.94) 0%, rgba(42,26,14,0.96) 100%);
    border: 1.5px solid var(--gold);
    border-radius: 6px; padding: 16px 24px 12px;
    box-shadow:
      0 4px 40px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(212,168,83,0.15),
      0 0 0 4px rgba(26,20,16,0.5),
      0 0 0 5px rgba(212,168,83,0.2);
    min-height: 110px; max-height: 50vh;
    position: relative; display: flex; flex-direction: column;
    overflow: hidden;
  }
  #dialogue-box::before {
    content: ''; position: absolute; top: -2px; left: 12px; right: 12px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }
  #dialogue-box::after {
    content: '◆'; position: absolute; top: -8px; left: 18px;
    color: var(--gold); font-size: 8px; opacity: 0.7;
    text-shadow: 12px 0 0 var(--gold), 24px 0 0 var(--gold);
    letter-spacing: 6px;
  }

  #speaker-name {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 16px; margin-bottom: 5px;
    letter-spacing: 2px; border-radius: 2px;
    background: var(--vermilion);
    color: #fff;
    box-shadow: 0 2px 8px rgba(197,59,59,0.3);
  }
  #speaker-name.user-tag {
    background: var(--gold);
    color: var(--sumi);
    box-shadow: 0 2px 8px rgba(212,168,83,0.3);
  }

  /* 文本滚动容器 */
  #dialogue-text-wrapper {
    flex: 1;
    overflow-y: auto;
    min-height: 44px;
    padding-right: 4px;
  }
  #dialogue-text-wrapper::-webkit-scrollbar { width: 4px; }
  #dialogue-text-wrapper::-webkit-scrollbar-thumb {
    background: rgba(212,168,83,0.25);
    border-radius: 2px;
  }
  #dialogue-text-wrapper::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
  }

  /* 纯文本模式（打字中） */
  #dialogue-plain {
    color: var(--washi);
    font-size: 16px; line-height: 1.85;
    font-weight: 400; letter-spacing: 0.2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    white-space: pre-wrap; user-select: text;
  }
  #dialogue-plain .cursor {
    display: inline-block; width: 2px; height: 1.1em;
    background: var(--gold);
    vertical-align: text-bottom; animation: blink 0.8s infinite;
  }

  /* 富文本模式（渲染后） */
  #dialogue-rendered {
    display: none;
    color: var(--washi);
    font-size: 16px; line-height: 1.9;
    font-weight: 400; letter-spacing: 0.2px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    user-select: text;
  }
  /* Markdown 渲染后的内部样式 */
  #dialogue-rendered p { margin: 0 0 0.7em; }
  #dialogue-rendered p:last-child { margin-bottom: 0; }
  #dialogue-rendered strong { color: var(--gold-light); font-weight: 700; }
  #dialogue-rendered em { color: var(--sakura); font-style: italic; }
  #dialogue-rendered code {
    background: rgba(0,0,0,0.35);
    padding: 1px 6px; border-radius: 3px;
    font-size: 0.9em; font-family: 'Consolas', 'Microsoft YaHei', monospace;
    color: var(--gold-light);
  }
  #dialogue-rendered pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(212,168,83,0.15);
    border-radius: 4px; padding: 10px 14px; margin: 0.5em 0;
    overflow-x: auto; font-size: 0.88em; line-height: 1.5;
    font-family: 'Consolas', 'Microsoft YaHei', monospace;
  }
  #dialogue-rendered pre code {
    background: none; padding: 0; font-size: inherit;
  }
  #dialogue-rendered ul, #dialogue-rendered ol { margin: 0.4em 0; padding-left: 1.5em; }
  #dialogue-rendered li { margin-bottom: 0.25em; }
  #dialogue-rendered blockquote {
    border-left: 3px solid var(--gold);
    margin: 0.5em 0; padding: 0.3em 0.8em;
    background: rgba(212,168,83,0.06);
    color: var(--washi-dim);
  }
  #dialogue-rendered hr {
    border: none; border-top: 1px solid rgba(212,168,83,0.2);
    margin: 0.8em 0;
  }
  #dialogue-rendered h1, #dialogue-rendered h2, #dialogue-rendered h3 {
    color: var(--gold);
    margin: 0.6em 0 0.3em;
    font-weight: 700;
  }
  #dialogue-rendered h1 { font-size: 1.3em; }
  #dialogue-rendered h2 { font-size: 1.15em; }
  #dialogue-rendered h3 { font-size: 1.05em; }
  #dialogue-rendered a { color: var(--gold-light); }

  /* KaTeX 公式暗色适配 */
  #dialogue-rendered .katex { color: var(--washi); }
  #dialogue-rendered .katex-display { margin: 0.6em 0; }

  @keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

  /* 输入区 */
  #input-area {
    max-width: 920px; margin: 8px auto 0;
    display: flex; gap: 8px; align-items: flex-end;
    opacity: 0; transition: opacity 0.3s, margin-bottom 0.25s;
  }
  #input-area.show { opacity: 1; }
  #input-area textarea {
    flex: 1; padding: 10px 16px;
    background: rgba(42,26,14,0.85); backdrop-filter: blur(8px);
    border: 1px solid rgba(212,168,83,0.25); border-radius: 4px;
    color: var(--washi); font-size: 14px; outline: none; font-family: inherit;
    transition: border-color 0.3s, height 0.15s;
    resize: none; overflow-y: auto;
    min-height: 40px; max-height: 160px; /* 4x original */
    line-height: 1.4;
  }
  #input-area textarea::placeholder { color: rgba(216,207,192,0.35); }
  #input-area textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(212,168,83,0.15);
  }
  #input-area textarea::-webkit-scrollbar { width: 4px; }
  #input-area textarea::-webkit-scrollbar-thumb {
    background: rgba(212,168,83,0.25); border-radius: 2px;
  }
  #input-area textarea::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.2); border-radius: 2px;
  }
  #input-area button {
    padding: 10px 20px;
    background: linear-gradient(180deg, var(--vermilion) 0%, var(--vermilion-dark) 100%);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
    color: #fff; font-size: 14px; cursor: pointer; font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(197,59,59,0.25);
  }
  #input-area button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(197,59,59,0.4); }
  #input-area button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  #click-hint {
    position: absolute; right: 24px; bottom: 10px;
    color: rgba(212,168,83,0.45); font-size: 11px;
    animation: hintPulse 2s ease-in-out infinite; cursor: pointer;
  }
  @keyframes hintPulse { 0%,100% { opacity:0.2; } 50% { opacity:0.6; } }

  #copy-btn {
    position: absolute; right: 20px; bottom: 10px; z-index: 30;
    width: 30px; height: 30px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    color: rgba(255,255,255,0.5); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; font-family: inherit; line-height: 1;
  }
  #copy-btn:hover {
    background: rgba(212,168,83,0.15); border-color: var(--gold);
    color: var(--gold-light); box-shadow: 0 0 12px rgba(212,168,83,0.1);
  }
  #copy-btn.copied {
    background: rgba(76,175,80,0.25); border-color: rgba(76,175,80,0.5);
    color: #81C784; width: auto; padding: 0 12px; font-size: 12px;
  }

  /* ===== 状态指示器 ===== */
  #status-bar {
    position: absolute; top: 14px; right: 16px; z-index: 50;
    display: none; /* 初始隐藏，游戏开始后显示 */
    flex-direction: column; align-items: flex-end;
    gap: 6px;
  }
  #status-bar.visible { display: flex; }
  /* Row 1: 退出 + 模型切换 */
  #status-row-actions {
    display: flex; align-items: center; gap: 8px;
  }
  /* Row 2: 状态指示灯 + 文字 */
  #status-row-info {
    display: flex; align-items: center; gap: 7px;
    background: rgba(26,20,16,0.65); backdrop-filter: blur(8px);
    border: 1px solid rgba(212,168,83,0.15); border-radius: 20px;
    padding: 4px 14px 4px 9px; font-size: 11px; color: var(--washi-dim);
    white-space: nowrap;
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: #C53B3B; transition: background 0.5s;
  }
  #status-text {
    white-space: nowrap; flex-shrink: 0;
  }
  #model-toggle {
    background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.25);
    border-radius: 10px; padding: 2px 10px;
    color: #4caf50; font-size: 10px; cursor: pointer; font-family: inherit;
    transition: all 0.3s; flex-shrink: 0; line-height: 1.4;
    white-space: nowrap;
  }
  #model-toggle:hover {
    background: rgba(76,175,80,0.30);
    box-shadow: 0 0 10px rgba(76,175,80,0.2);
  }
  #model-toggle:active {
    transform: scale(0.95);
  }
  #model-toggle.pro {
    background: rgba(197,59,59,0.15); border-color: rgba(197,59,59,0.25);
    color: var(--vermilion);
  }
  #model-toggle.pro:hover {
    background: rgba(197,59,59,0.28);
    box-shadow: 0 0 10px rgba(197,59,59,0.2);
  }
  #status-dot.connected { background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.4); }
  #status-dot.thinking { background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow:0 0 4px rgba(212,168,83,0.3); } 50% { box-shadow:0 0 10px rgba(212,168,83,0.6); } }

  /* ===== 历史面板 ===== */
  #history-btn {
    position: absolute; top: 16px; left: 18px; z-index: 50;
    background: rgba(26,20,16,0.65); backdrop-filter: blur(8px);
    border: 1px solid rgba(212,168,83,0.15); border-radius: 20px;
    padding: 5px 12px; color: var(--washi-dim); font-size: 11px; cursor: pointer;
    font-family: inherit; transition: all 0.3s;
  }
  #history-btn:hover { background: rgba(60,36,21,0.7); color: var(--washi); }
  #history-panel {
    position: absolute; top: 54px; left: 18px; z-index: 50;
    width: 320px; max-height: 50vh; overflow-y: auto;
    background: rgba(26,20,16,0.96); backdrop-filter: blur(16px);
    border: 1px solid rgba(212,168,83,0.15); border-radius: 4px;
    padding: 12px; display: none; user-select: text;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #history-panel.open { display: block; }
  #history-panel::-webkit-scrollbar { width: 3px; }
  #history-panel::-webkit-scrollbar-thumb { background: rgba(212,168,83,0.2); border-radius: 2px; }
  .h-item {
    padding: 7px 10px; margin-bottom: 3px; border-radius: 3px;
    font-size: 12.5px; line-height: 1.5; border-left: 2px solid transparent;
    color: var(--washi);
  }
  .h-item.claude { background: rgba(197,59,59,0.06); border-left-color: var(--vermilion); }
  .h-item.user { background: rgba(212,168,83,0.06); border-left-color: var(--gold); }
  .h-item .h-name { font-size: 10px; font-weight: 700; margin-bottom: 1px; }
  .h-item.claude .h-name { color: var(--vermilion); }
  .h-item.user .h-name { color: var(--gold); }

  /* Loading */
  #loading-dots { display: none; align-items: center; gap: 4px; padding: 5px 0; }
  #loading-dots.show { display: flex; }
  #loading-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.4s ease-in-out infinite;
  }
  #loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  #loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform:scale(0.5); opacity:0.3; } 40% { transform:scale(1); opacity:1; } }

  /* 标题画面 */
  #title-screen {
    position: absolute; inset: 0; z-index: 100;
    transition: opacity 1.2s, transform 1.2s;
  }
  #title-screen.hidden { opacity: 0; transform: scale(1.06); pointer-events: none; }
  #title-bg {
    position: absolute; inset: 0;
    background: url(assets/backgrounds/wallpapers/bkg.jpg) center/cover no-repeat;
  }
  #title-bg::after {
    display: none;  /* 保持背景原始亮度 */
  }

  /* 左侧菜单面板 */
  #title-menu-panel {
    position: absolute; left: 3%; top: 26%; bottom: 10%; z-index: 3;
    display: flex; flex-direction: column;
    justify-content: space-evenly;  /* 从上到下均匀分布 */
    width: 260px;
  }
  #title-menu-panel .title-btn {
    padding: 18px 16px; text-align: center;
    background: rgba(26,20,16,0.55); backdrop-filter: blur(12px);
    border: 1px solid rgba(212,168,83,0.3); border-left: 4px solid var(--gold);
    color: var(--washi); font-size: 18px; cursor: pointer;
    font-family: inherit; letter-spacing: 4px;
    transition: all 0.35s; border-radius: 0 6px 6px 0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    width: 100%;
  }
  #title-menu-panel .title-btn:hover {
    background: rgba(42,26,14,0.7);
    border-color: var(--gold);
    border-left-width: 5px;
    box-shadow: 0 0 24px rgba(212,168,83,0.12), inset 0 0 30px rgba(212,168,83,0.04);
    transform: translateX(4px);
    color: #fff;
  }
  #title-menu-panel .title-btn:active {
    transform: scale(0.97); transition: transform 0.1s;
  }
  #title-menu-panel .title-btn.placeholder {
    opacity: 0.5; border-left-color: rgba(212,168,83,0.12);
  }
  #title-menu-panel .title-btn.placeholder:hover {
    opacity: 0.65; transform: translateX(2px);
  }
  #title-menu-panel .title-btn.exit-btn {
    margin-top: 14px; border-left-color: rgba(197,59,59,0.4);
    font-size: 13px; padding: 11px 28px;
  }
  #title-menu-panel .title-btn.exit-btn:hover {
    border-left-color: var(--vermilion);
    box-shadow: 0 0 20px rgba(197,59,59,0.1);
  }

  #title-screen .status-text {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 3;
    font-family: 'Dancing Script', 'Georgia', serif;
    font-size: 16px; color: rgba(245,240,232,0.45); letter-spacing: 1px;
  }

  /* ===== 音量弹窗 ===== */

// ===== BGM 播放控制 =====
let bgmUnlocked = false;
function bgmUrl(track) {
  return "assets/bgm/" + track;
}
function tryPlay(audio, label) {
  audio.play().then(() => {
    console.log('[BGM] play() 成功:', label || audio.src);
  }).catch(err => {
    console.error('[BGM] play() 失败:', label || audio.src, err.name, err.message);
  });
}
function audioOnError(audio, label) {
  audio.addEventListener('error', () => {
    const a = audio;
    console.error('[BGM] Audio 加载错误:', label, {
      src: a.src, currentSrc: a.currentSrc,
      errorCode: a.error ? a.error.code : '?',
      errorMsg: a.error ? a.error.message : '?',
      networkState: a.networkState, readyState: a.readyState
    });
  });
}

// 强制杀死一个 Audio 元素，不触发 error 事件
function killAudio(audio) {
  if (!audio) return;
  audio.onerror = null;  // 移除 error handler 避免清理时误报
  audio.pause();
  audio.removeAttribute('src');
}

// 停止所有正在进行的 fade 动画，并彻底杀死旧 bgmAudio
function stopBgmCleanup() {
  if (bgmFadeTimer) { clearInterval(bgmFadeTimer); bgmFadeTimer = null; }
  // 也清理由 fadeIn 引用的目标 Audio（防止残留 interval 唤醒它）
  if (bgmFadeTarget && bgmFadeTarget !== bgmAudio) {
    killAudio(bgmFadeTarget);
  }
  bgmFadeTarget = null;
  if (bgmAudio) { killAudio(bgmAudio); bgmAudio = null; }
  currentBgmTrack = null;
}

function setupAudioUnlock() {
  const unlock = () => {
    if (!bgmUnlocked) {
      bgmUnlocked = true;
      console.log('[BGM] AudioUnlock 触发！bgmAudio=', bgmAudio ? '存在' : 'null');
      document.removeEventListener("click", unlock);
      document.removeEventListener("keydown", unlock);
      if (!bgmAudio) initBgm();
      else tryPlay(bgmAudio, 'unlock');
    }
  };
  document.addEventListener("click", unlock);
  document.addEventListener("keydown", unlock);
}

function initBgm() {
  stopBgmCleanup();  // 先彻底清理旧状态
  const track = SCENE_BGM["_title"];
  if (!track) { console.warn('[BGM] initBgm: 标题曲目未配置'); return; }
  const url = bgmUrl(track);
  console.log('[BGM] initBgm: track=', track);
  bgmAudio = new Audio(url);
  bgmAudio.loop = true;
  bgmAudio.volume = bgmMuted ? 0 : bgmVolume;
  currentBgmTrack = track;
  audioOnError(bgmAudio, 'initBgm:' + track);
  tryPlay(bgmAudio, 'initBgm:' + track);
}

function switchBgm(bgPath) {
  const filename = bgPath.replace(/^.*[\\/]/, "");
  const track = SCENE_BGM[filename] || SCENE_BGM["_default"];
  if (!track || track === currentBgmTrack) return;
  const url = bgmUrl(track);
  console.log('[BGM] switchBgm: bgPath=' + bgPath + ' → track=' + track);

  // 停止所有旧的 fade 动画
  if (bgmFadeTimer) { clearInterval(bgmFadeTimer); bgmFadeTimer = null; }
  if (bgmFadeTarget) { killAudio(bgmFadeTarget); bgmFadeTarget = null; }

  // 构造新的 Audio，先静音
  const newAudio = new Audio(url);
  newAudio.loop = true; newAudio.volume = 0;
  audioOnError(newAudio, 'switchBgm:' + track);

  // 渐出旧 BGM（如果存在）
  if (bgmAudio) {
    const old = bgmAudio;
    let v = old.volume;
    const fadeOut = setInterval(() => {
      if (v > 0.03) { v -= 0.03; old.volume = Math.max(0, v); }
      else { clearInterval(fadeOut); killAudio(old); }
    }, 50);
  }

  // 切换到新 BGM
  bgmAudio = newAudio;
  currentBgmTrack = track;
  tryPlay(newAudio, 'switchBgm:' + track);

  // 渐入新 BGM
  let vol = 0;
  const target = bgmMuted ? 0 : bgmVolume;
  bgmFadeTarget = newAudio;  // 记录当前 fadeIn 目标，防止残留
  bgmFadeTimer = setInterval(() => {
    if (vol < target - 0.02) { vol += 0.02; newAudio.volume = Math.min(vol, target); }
    else { newAudio.volume = target; clearInterval(bgmFadeTimer); bgmFadeTimer = null; bgmFadeTarget = null; }
  }, 50);
}

function spawnThinkBubble(text) {
  if (!text || text.trim().length === 0) return;
  // 限制单个气泡文本长度
  const short = text.length > 80 ? text.slice(0, 78) + '…' : text;

  const layer = document.getElementById('think-bubble-layer');
  const bubble = document.createElement('div');
  bubble.className = 'think-bubble';
  bubble.textContent = short;

  // 茉子立绘大约在左侧 4% ~ 30% 区域（常态时），居中时在 27%~73%
  // 气泡放在茉子立绘两侧交替
  const side = bubbleSideToggle ? 'right' : 'left';
  bubbleSideToggle = !bubbleSideToggle;
  bubble.classList.add(side + '-bubble');

  // 茉子位置估算（基于当前 CSS 状态）
  const mWrap = document.getElementById('wrap-makoto');
  const mRect = mWrap.getBoundingClientRect();
  const mCenterX = mRect.left + mRect.width / 2;
  const mTop = mRect.top;

  // 气泡位置：茉子左侧或右侧
  const offsetX = side === 'left'
    ? mCenterX - mRect.width * 0.45 - 80 - Math.random() * 40
    : mCenterX + mRect.width * 0.25 + Math.random() * 50;

  const baseY = mTop + mRect.height * 0.15 + Math.random() * mRect.height * 0.35;

  bubble.style.left = Math.max(10, Math.min(window.innerWidth - 270, offsetX)) + 'px';
  bubble.style.top = baseY + 'px';

  layer.appendChild(bubble);

  // 动画结束后移除
  bubble.addEventListener('animationend', () => {
    if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
  });
}

function feedThinkContent(text) {
  // 将思考内容拆成短句加入队列
  if (!text || text.trim().length === 0) return;
  // 按标点拆成短句
  const sentences = text.split(/(?<=[。！？，…\.!\?,])/g)
    .map(s => s.trim())
    .filter(s => s.length > 0);
  thinkContentQueue.push(...sentences);
}

// ===== Markdown 渲染 =====
function renderMarkdown(text) {
  const plain = document.getElementById('dialogue-plain');
  const rendered = document.getElementById('dialogue-rendered');

  // 用 marked 解析
  let html;
  try {
    html = marked.parse(text);
  } catch (e) {
    // 回退：纯文本带换行
    html = text.replace(/\n/g, '<br>');
  }

  rendered.innerHTML = html;

  // 所有链接在新标签页打开，不覆盖当前页面
  rendered.querySelectorAll('a[href]').forEach(a => {
    a.setAttribute('target', '_blank');
    a.setAttribute('rel', 'noopener noreferrer');
  });

  // 用 KaTeX 渲染公式
  try {
    renderMathInElement(rendered, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true },
      ],
      throwOnError: false,
    });
  } catch (e) {
    console.warn('[KaTeX] render error:', e);
  }

  // 平滑切换
  plain.style.display = 'none';
  rendered.style.display = 'block';

  // 滚动到顶部，方便从头阅读
  const wrapper = document.getElementById('dialogue-text-wrapper');
  wrapper.scrollTop = 0;
}

// ===== 语音合成 (TTS) =====
function parseVoiceTag(text) {
  // 解析并移除 [VOICE: ...] 标签
  const re = /\[VOICE:\s*([^\]]+)\]/gi;
  let voiceText = null;
  const cleanText = text.replace(re, (match, captured) => {
    if (!voiceText) voiceText = captured.trim(); // 取第一个 VOICE 标签
    return '';
  });
  // 清理多余空行
  return {
    displayText: cleanText.replace(/\n{3,}/g, '\n\n').trim(),
    voiceText: voiceText
  };
}

// 生成语音 ID（文本哈希）
function voiceIdFromText(text) {
  let hash = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash = hash & hash; // 32-bit
  }
  return 'v' + Math.abs(hash).toString(36);
}

// 预取语音 Blob（与打字并行），返回 { voiceId, url, blob }
async function prefetchVoiceBlob(text) {
  if (!text || text.trim().length === 0) return null;
  const voiceId = voiceIdFromText(text.trim());
  // 命中缓存直接返回
  const cached = voiceCache.get(voiceId);
  if (cached) {
    console.log('[VOICE] cache hit:', voiceId);
    return { voiceId, url: cached.url, blob: cached.blob };
  }
  try {
    const res = await fetch(`${API}/api/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text.trim(), text_language: 'zh', voiceId })
    });
    if (!res.ok) return null;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    voiceCache.store(voiceId, blob, url);
    return { voiceId, url, blob };
  } catch (e) {
    console.warn('[VOICE] prefetch failed:', e.message);
    return null;
  }
}

let lastMissingVoiceId = null;   // 追踪上次缺失的语音 ID（二次点击 → 重新生成）
function replayVoice(voiceId) {
  const id = voiceId || currentVoiceId;
  if (!id) return;

  // 1. 先查内存缓存
  const cached = voiceCache.get(id);
  if (cached) {
    lastMissingVoiceId = null;
    const audio = document.getElementById('voice-audio');
    audio.onerror = null;
    audio.src = cached.url;
    audio.volume = Math.min(1.0, voiceVolume);
    currentVoiceId = id;
    try { audio.play(); } catch(e) {}
    return;
  }

  // 2. 回退到服务端永久存储
  const audio = document.getElementById('voice-audio');
  const serverUrl = `${API}/api/voice/${id}`;
  audio.volume = Math.min(1.0, voiceVolume);
  currentVoiceId = id;

  audio.onerror = async () => {
    if (lastMissingVoiceId === id) {
      // 二次点击 → 重新生成语音
      lastMissingVoiceId = null;
      await regenerateVoice(id);
    } else {
      // 首次缺失 → 弹出提示
      lastMissingVoiceId = id;
      showToast('缄"茉"不言');
    }
  };

  audio.src = serverUrl;
  try { audio.play(); } catch(e) {}
}

// 重新生成语音（当文件被删后二次点击触发）
async function regenerateVoice(voiceId) {
  // 从历史记录中找到对应文本，或使用当前显示文本
  const entry = history.find(h => h.voiceId === voiceId);
  const text = entry ? entry.text : currentText;
  if (!text || text.trim().length === 0) {
    showToast('无法重新生成：找不到原始文本');
    return;
  }
  try {
    const res = await fetch(`${API}/api/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text.trim(), text_language: 'zh', voiceId })
    });
    if (!res.ok) { showToast('语音重新生成失败'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    voiceCache.store(voiceId, blob, url);
    // 用新生成的语音播放
    const audio = document.getElementById('voice-audio');
    audio.onerror = null;
    audio.src = url;
    audio.volume = Math.min(1.0, voiceVolume);
    currentVoiceId = voiceId;
    try { audio.play(); } catch(e) {}
    showToast('语音已重新生成 ✓');
  } catch (e) {
    console.warn('[VOICE] regenerate failed:', e.message);
    showToast('语音重新生成失败');
  }
}

// ===== 语音缓存（上限 200MB，FIFO 淘汰）=====
const voiceCache = {
  entries: new Map(),       // voiceId -> { blob, url, size, timestamp }
  totalSize: 0,
  maxSize: 200 * 1024 * 1024,

  store(voiceId, blob, url) {
    if (this.entries.has(voiceId)) this._evict(voiceId);
    const entry = { blob, url, size: blob.size, timestamp: Date.now() };
    this.entries.set(voiceId, entry);
    this.totalSize += blob.size;
    console.log('[VOICE-CACHE] store:', voiceId, (blob.size/1024).toFixed(0)+'KB', 'total:', (this.totalSize/1024/1024).toFixed(1)+'MB');
    // 超限则淘汰最旧的
    while (this.totalSize > this.maxSize && this.entries.size > 1) {
      const oldest = [...this.entries.entries()]
        .sort((a, b) => a[1].timestamp - b[1].timestamp)[0];
      if (oldest) { console.log('[VOICE-CACHE] evict:', oldest[0]); this._evict(oldest[0]); }
    }
  },

  get(voiceId) { return this.entries.get(voiceId); },

  _evict(voiceId) {
    const e = this.entries.get(voiceId);
    if (!e) return;
    this.totalSize -= e.size;
    URL.revokeObjectURL(e.url);
    this.entries.delete(voiceId);
  }
};

async function handleFiles(fileList) {
  const files = Array.from(fileList);
  // 转为 base64
  const payload = [];
  for (const f of files) {
    const data = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(f);
    });
    payload.push({ name: f.name, type: f.type, data });
  }

  // 上传到服务器
  try {
    const res = await fetch(`${API}/api/upload`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, files: payload }),
    });
    if (!res.ok) throw new Error('上传失败');
    const result = await res.json();
    uploadedFiles.push(...result.files);
    renderFileChips();
  } catch (e) {
    showError('文件上传失败: ' + e.message);
  }
}

function removeFile(index) {
  uploadedFiles.splice(index, 1);
  renderFileChips();
}

function renderFileChips() {
  const container = document.getElementById('file-chips');
  if (uploadedFiles.length === 0) {
    container.classList.remove('show');
    container.innerHTML = '';
    return;
  }
  container.classList.add('show');
  container.innerHTML = uploadedFiles.map((f, i) => {
    const icon = f.type?.startsWith('image/') ? '🖼️' :
                 f.type?.includes('pdf') ? '📄' :
                 f.type?.includes('word') || f.name.endsWith('.docx') || f.name.endsWith('.doc') ? '📝' :
                 f.type?.includes('presentation') || f.name.endsWith('.pptx') || f.name.endsWith('.ppt') ? '📊' :
                 f.name.match(/\.(py|js|ts|jsx|tsx|go|rs|java|c|cpp|h|rb|php|swift|kt)$/i) ? '💻' :
                 '📎';
    return `<span class="file-chip">
      <span class="fc-icon">${icon}</span>
      <span class="fc-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
      <button class="fc-del" onclick="event.stopPropagation();removeFile(${i})">×</button>
    </span>`;
  }).join('');
}

function insertCommand(cmd) {
  const input = document.getElementById('user-input');
  const start = input.selectionStart || 0;
  const end = input.selectionEnd || 0;
  const before = input.value.slice(0, start);
  const after = input.value.slice(end);

  // 在光标位置插入指令，前后留空格便于阅读
  const prefix = before.length > 0 && before[before.length - 1] !== ' ' ? ' ' : '';
  const suffix = after.length > 0 && after[0] !== ' ' ? ' ' : '';
  input.value = before + prefix + cmd + suffix + after;

  // 光标移到插入指令之后
  const newPos = start + prefix.length + cmd.length + suffix.length;
  input.setSelectionRange(newPos, newPos);
  input.focus();

  toggleCmdPopup(); // 关闭弹窗
}

const userInputEl = document.getElementById('user-input');
userInputEl.addEventListener('keydown', (e) => {
  // Enter 发送（Shift+Enter 换行）
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
    return;
  }

  if (e.key === 'Backspace' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const input = e.target;
    const start = input.selectionStart;
    const end = input.selectionEnd;

    // 只有光标不在选中文本时（纯光标定位）才触发
    if (start === end && start > 0) {
      const before = input.value.slice(0, start);
      // 匹配光标前是否有 /command 格式的 token（可能前面有空格）
      const m = before.match(/(\s|^)(\/[a-zA-Z][a-zA-Z0-9_-]*)\s*$/);
      if (m) {
        e.preventDefault();
        // 删除整条 /command
        const deleteStart = start - m[0].length + (m[1] === '' ? 0 : m[1].length);
        input.value = input.value.slice(0, deleteStart) + input.value.slice(end);
        input.setSelectionRange(deleteStart, deleteStart);
      }
    }
  }

  // ESC 关闭弹窗
  if (e.key === 'Escape' && cmdPopupOpen) {
    toggleCmdPopup();
    e.stopPropagation();
  }
});

// ===== 交互式问题/选项系统 =====
function detectTextOptions(text) {
  const lines = text.split('\n');
  const optionPattern = /^\s*(\d+)[\.\)、）]\s*(.+)$/;
  let optionStart = -1;
  const options = [];

  for (let i = lines.length - 1; i >= 0; i--) {
    const m = lines[i].match(optionPattern);
    if (m) {
      options.unshift({ num: parseInt(m[1]), text: m[2].trim() });
      optionStart = i;
    } else if (options.length > 0 && lines[i].trim() !== '') {
      break;
    }
  }

  if (options.length < 2 || options.length > 5) return null;

  // 提取选项前后的上下文（扩展窗口：前 6 行 + 后 4 行）
  const beforeLines = lines.slice(Math.max(0, optionStart - 6), optionStart)
    .filter(l => l.trim());
  const afterLines = lines.slice(lines.length > optionStart + options.length ? optionStart + options.length : lines.length)
    .filter(l => l.trim()).slice(0, 4);
  const contextText = [...beforeLines, ...afterLines].join(' ');

  // 智能判断：是"让我选"还是"列信息"？
  // choiceKW — 明确邀请用户选择的词（删除模糊词"帮你"、"推荐"、"建议你"、"你觉得"、"你想"）
  const choiceKW = /选[一个]?|选择|挑[一个]?|想要哪|偏好|决定|哪个|which|choose|pick|prefer|帮我选|你希望|你想选|你决定|你说了算|告诉我|指使/;
  // infoKW — 信息列表/步骤说明的指示词（大幅扩充）
  const infoKW = /以下是|如下|例如|比如|原因|理由|步骤|方法|方面|分类|有以下|包括|分为|流程|过程|操作|方式|技巧|说明|介绍|归纳|总结|共[有]?.*[步点条项]|首先|然后|接着|最后|the following|reasons|steps|example|首先.*然后|先.*再.*最后/;

  // 上下文评分
  const contextChoiceScore = (contextText.match(choiceKW) || []).length;
  const contextInfoScore = (contextText.match(infoKW) || []).length;

  // 全文评分（infoKW 扫全文，不怕步骤词离得远）
  const fullInfoScore = (text.match(infoKW) || []).length;
  const fullChoiceScore = (text.match(choiceKW) || []).length;

  // 规则 1：全文明确是信息列表 → 不弹窗
  if (fullInfoScore >= 2) return null;

  // 规则 2：全文没有足够的选择邀请词 → 不弹窗（至少 2 个）
  if (fullChoiceScore < 2) return null;

  // 规则 3：上下文信息词多于选择词 → 不弹窗
  if (contextInfoScore > contextChoiceScore) return null;

  // 规则 4：必须包含明确的"邀请选择"语气
  const inviteKW = /你想|你选|你要|你决定|选哪个|选一个|选哪个|选什么|挑哪个|告诉我|你希望|帮你选|偏好|想要哪|你说了算|指使/;
  if (!inviteKW.test(contextText)) return null;

  const questionLines = beforeLines.slice(-2);
  const qText = questionLines.length > 0
    ? questionLines.join('\n')
    : '请选择一个选项：';

  return { text: qText, options: options.map(o => o.text) };
}

      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.textContent = '📋';
      }, 1800);
    }).catch(() => { /* silent */ });
  } else {
    // 降级方案：创建临时 textarea 选中复制

    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';

    copyBtn.textContent = '✓ 已复制';
    setTimeout(() => {
      copyBtn.classList.remove('copied');

  }
}

async function sendMsg() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || btn.disabled) return;
  input.value = '';
  // 重置输入框高度
  resetInputHeight();
  btn.disabled = true;
  document.getElementById('upload-btn').disabled = true;
  isSending = true;

  // 保存当前上传的文件引用，然后清空
  const currentFiles = [...uploadedFiles];
  uploadedFiles = [];
  renderFileChips();

  // 用户消息展示 — 芳乃仍在中心（用户回合）
  showMsg('主人', text, false);
  await waitTypeDone();

  // 用户消息展示完毕后，进入思考阶段，两人归位
  showLoading();

  try {
    await chatWithClaude(text, currentFiles);
  } catch (e) {
    clearThinkBubbles();
    showError('通信失败: ' + e.message);
    showMsg('茉子', '抱歉，连接似乎出了点问题…请确认 go.bat 窗口中的日志信息。', true);
  }
  btn.disabled = false;
  document.getElementById('upload-btn').disabled = false;
  isSending = false;
  setStatus('connected', '已连接');
}

function waitTypeDone() {
  return new Promise(r => {
    if (!isTyping) return r();
    const check = setInterval(() => {
      if (!isTyping) { clearInterval(check); r(); }
    }, 50);
  });
}

// ===== Claude API =====
async function chatWithClaude(msg, files) {
  let sessionInUse = false;

  async function doChat() {
    const requestId = crypto.randomUUID();
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg, requestId, sessionId,
        allowedTools: ['Bash', 'Read', 'Write', 'Glob', 'Grep',
          'mcp__playwright__browser_navigate', 'mcp__playwright__browser_snapshot',
          'mcp__playwright__browser_type', 'mcp__playwright__browser_press_key',
          'mcp__playwright__browser_wait_for', 'mcp__playwright__browser_click',
          'mcp__playwright__browser_take_screenshot', 'mcp__playwright__browser_evaluate'],
        permissionMode: currentPermissionMode,
        uploadedFiles: files || [],
        history: history.slice(0, -1).slice(-20), // 排除当前消息，带最近20条历史
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '', buffer = '', hasError = false, errorMsg = '';
    let firstReplyChunk = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.trim()) continue;
        try {
          const chunk = JSON.parse(line);
          if (chunk.type === 'claude_json') {
            const m = chunk.data;
            if (m.type === 'assistant') {
              const newText = (m.message?.content || [])
                .filter(c => c.type === 'text').map(c => c.text).join('');

              // 检查是否有思考内容
              const thinkingText = (m.message?.content || [])
                .filter(c => c.type === 'thinking' || c.type === 'reasoning')
                .map(c => c.text || c.thinking || '').join('');
              if (thinkingText) {
                feedThinkContent(thinkingText);
              }

              if (newText) {
                // 第一个回复片段到达 → 清除思考气泡，准备打字
                if (!firstReplyChunk) {
                  firstReplyChunk = true;
                  clearThinkBubbles();
                  stopExprCycle();
                  setStatus('thinking', '嗯…在写了在写了…');
                }
                fullText += newText;
              }
            } else if (m.type === 'result') {
              if (m.subtype === 'error_during_execution') {
                if (m.sessionInUse) {
                  sessionInUse = true;  // 标记需要重试
                } else {
                  hasError = true;
                  errorMsg = m.error || (m.errors && m.errors[0]?.message) || 'MakoCode 执行出错，请检查后端日志';
                }
              }
            } else if (m.type === 'system' && m.subtype === 'init') {
              setStatus('thinking', randomMakotoThink());
            }
          } else if (chunk.type === 'error') {
            hasError = true; errorMsg = chunk.error || '通信错误';
          } else if (chunk.type === 'stderr') {
            // 检测会话锁定
            if (chunk.data && chunk.data.includes('already in use')) {
              sessionInUse = true;
            }
            // stderr 内容也可作为思考线索
            if (chunk.data && chunk.data.trim().length > 0 && chunk.data.trim().length < 200) {
              feedThinkContent(chunk.data.trim());
            }
            console.log('[stderr]', chunk.data);
          } else if (chunk.type === 'gallm_init') {
            currentQId = chunk.qId || null;
          } else if (chunk.type === 'gallm_question') {
            // 系统级问题（如权限确认）→ 弹出交互按钮
            const q = chunk.data;
            showQuestion(q.text, q.options);
          }
        } catch (e) {
          console.warn('[galchat] parse:', e);
        }
      }
    }

    return { fullText, hasError, errorMsg };
  }

  // 首次尝试
  let result = await doChat();

  // 会话被锁 → 换新 sessionId 重试一次
  if (sessionInUse && !result.fullText) {
    console.log('[galchat] Session in use, retrying with new sessionId...');
    sessionId = crypto.randomUUID();
    sessionInUse = false;
    // 重新显示加载状态
    showLoading();
    result = await doChat();
  }

  clearThinkBubbles();
  document.getElementById('loading-dots').classList.remove('show');
  stopExprCycle();

  let fullText = result.fullText, hasError = result.hasError, errorMsg = result.errorMsg;

  if (hasError && !fullText) {
    fullText = '抱歉，连接似乎出了点问题…请确认 go.bat 窗口中的日志信息。';
  }
  if (!fullText) fullText = '(无回应)';

  // 解析 [VOICE: ...] 标签（保留人话总结文字，但不合成语音）
  const { displayText, voiceText } = parseVoiceTag(fullText);
  // 打包版：回复不使用 TTS 语音合成，仅保留 VOICE 文字展示

  // Claude 回复 → 茉子说话
  setSpeaker('茉子');
  setCharState('claude');
  startExprCycle('claude');
  typeWrite(displayText);
  await new Promise(r => {
    const check = setInterval(() => { if (!isTyping) { clearInterval(check); r(); } }, 100);
  });

  history.push({ speaker: '茉子', text: displayText });
  renderHistory();
  setStatus('connected', '已连接');

  // 保存当前回复文本供复制按钮使用，显示复制按钮
  lastClaudeText = displayText;
  document.getElementById('copy-btn').style.display = 'flex';

  // 检测回复中是否包含选项式问题（如 "1. xxx 2. yyy 3. zzz"）
  const textOptions = detectTextOptions(displayText);
  if (textOptions) {
    showQuestion(textOptions.text, textOptions.options, true);
  } else {
    setTimeout(() => {
      document.getElementById('input-area').classList.add('show');
      document.getElementById('user-input').focus();
      resetInputHeight();
    }, 300);
  }

  // 自动存档
  autoSave();
}

// ===== 茉子人设编辑器 =====
let personaData = { persona: '', lore: '' };
let personaActiveTab = 'persona';

async function openPersonaEditor() {
  // 关闭设置面板，打开人设编辑器
  hideSettings();

  let loaded = false;
  // 优先通过 Electron IPC 读取
  if (window.makoElectron && window.makoElectron.readPersona) {
    const result = await window.makoElectron.readPersona();
    if (result.ok) {
      personaData.persona = result.persona || '';
      personaData.lore = result.lore || '';
      loaded = true;
    }
  }
  if (!loaded) {
    // 浏览器模式回退
    try {
      const r = await fetch(`${API}/api/persona`);
      if (r.ok) {
        const data = await r.json();
        personaData.persona = data.persona || '';
        personaData.lore = data.lore || '';
        loaded = true;
      }
    } catch (e) {
      showError('读取人设文件失败: ' + e.message);
      return;
    }
  }

  document.getElementById('persona-overlay').classList.add('show');
  switchPersonaTab('persona'); // 默认显示主设定
}

function closePersonaEditor() {
  document.getElementById('persona-overlay').classList.remove('show');
}

function switchPersonaTab(tab) {
  personaActiveTab = tab;
  const editor = document.getElementById('persona-editor');
  const tabs = document.querySelectorAll('#persona-tabs .p-tab');

  tabs.forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  editor.value = tab === 'persona' ? personaData.persona : personaData.lore;
}

async function savePersona() {
  // 先保存当前编辑的内容到缓存
  if (personaActiveTab === 'persona') {
    personaData.persona = document.getElementById('persona-editor').value;
  } else {
    personaData.lore = document.getElementById('persona-editor').value;
  }

  let saved = false;
  // 优先通过 Electron IPC 保存
  if (window.makoElectron && window.makoElectron.writePersona) {
    const result = await window.makoElectron.writePersona({
      persona: personaData.persona,
      lore: personaData.lore,
    });
    if (result.ok) saved = true;
    else showError('保存人设失败: ' + result.error);
  } else {
    // 浏览器模式回退
    try {
      const r = await fetch(`${API}/api/persona`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          persona: personaData.persona,
          lore: personaData.lore,
        }),
      });
      if (r.ok) saved = true;
      else showError('保存人设失败');
    } catch (e) {
      showError('保存人设失败: ' + e.message);
    }
  }

  if (saved) {
    showToast('✅ 茉子人设已保存！下次启动生效');
    setTimeout(() => closePersonaEditor(), 800);
  }
}

let updateUnlisten = null;

function initUpdateSystem() {
  // 从服务器获取当前版本号
  fetch(`${API}/api/version`)
    .then(r => r.json())
    .then(data => {
      const verEl = document.getElementById('current-version');
      if (verEl && data.version) verEl.textContent = 'v' + data.version;
    })
    .catch(() => {});

  if (window.makoElectron && window.makoElectron.onUpdateStatus) {
    updateUnlisten = window.makoElectron.onUpdateStatus((status) => {
      updateStatusUI(status);
    });
  } else {
    // 非 Electron 环境：显示"仅在桌面版可用"
    const area = document.getElementById('update-status-area');
    if (area) {
      area.innerHTML = '<span style="color:var(--washi-dim);font-size:11px;">自动更新仅在桌面版 MakoCode 中可用<br>（通过浏览器访问时请手动下载新版本）</span>';
    }
    document.getElementById('update-check-btn').style.display = 'none';
  }
}

function updateStatusUI(status) {
  const statusText = document.getElementById('update-status-text');
  const progressBar = document.getElementById('update-progress-bar');
  const progressFill = document.getElementById('update-progress-fill');
  const checkBtn = document.getElementById('update-check-btn');
  const installBtn = document.getElementById('update-install-btn');

  if (!statusText) return;

  switch (status.state) {
    case 'idle':
      statusText.textContent = '✅ 已是最新版本';
      statusText.style.color = '#4caf50';
      progressBar.style.display = 'none';
      checkBtn.style.display = '';
      installBtn.style.display = 'none';
      break;
    case 'checking':
      statusText.textContent = '🔍 正在检查更新...';
      statusText.style.color = '#2196f3';
      progressBar.style.display = 'none';
      checkBtn.style.display = 'none';
      installBtn.style.display = 'none';
      break;
    case 'downloading':
      statusText.textContent = '⬇️ 正在下载 v' + (status.version || '?') + '... ' + (status.progress || 0) + '%';
      statusText.style.color = '#ff9800';
      progressBar.style.display = '';
      progressFill.style.width = (status.progress || 0) + '%';
      checkBtn.style.display = 'none';
      installBtn.style.display = 'none';
      break;
    case 'downloaded':
      statusText.textContent = '🎉 新版本 v' + (status.version || '?') + ' 已就绪！点击下方按钮安装';
      statusText.style.color = '#ff9800';
      progressBar.style.display = '';
      progressFill.style.width = '100%';
      checkBtn.style.display = 'none';
      installBtn.style.display = '';
      break;
    case 'error':
      statusText.textContent = '⚠️ 更新检查失败: ' + (status.error || '未知错误');
      statusText.style.color = '#f44336';
      progressBar.style.display = 'none';
      checkBtn.style.display = '';
      installBtn.style.display = 'none';
      break;
  }
}

async function triggerUpdateCheck() {
  const statusText = document.getElementById('update-status-text');
  if (statusText) {
    statusText.textContent = '🔍 正在检查更新...';
    statusText.style.color = '#2196f3';
  }
  if (window.makoElectron && window.makoElectron.checkForUpdate) {
    const result = await window.makoElectron.checkForUpdate();
    if (!result.ok) {
      updateStatusUI({ state: 'error', error: result.error });
    }
  }
}

async function triggerUpdateInstall() {
  if (window.makoElectron && window.makoElectron.installUpdate) {
    await window.makoElectron.installUpdate();
  }
}

let allPresets = [];

async function showPresetModal() {
  const overlay = document.getElementById('preset-overlay');
  const list = document.getElementById('preset-list');
  if (!overlay || !list) return;

  // 加载预设数据（优先从服务器，失败时用离线回退）
  if (allPresets.length === 0) {
    try {
      const r = await fetch(`${API}/api/llm-presets`);
      if (r.ok) allPresets = await r.json();
      else allPresets = getFallbackPresets();
    } catch (e) {
      // 服务器不可用时用离线回退数据
      allPresets = getFallbackPresets();
    }
  }

  // 检测当前使用的供应商（根据 BASE_URL）
  const curBase = (document.getElementById('env-ANTHROPIC_BASE_URL')?.value || '').replace(/\/+$/, '');

  // 渲染预设卡片
  let html = '';
  for (const p of allPresets) {
    const isActive = curBase && p.baseUrl.replace(/\/+$/, '') === curBase;
    html += `<div class="preset-card${isActive ? ' active-preset' : ''}" onclick="applyPreset('${p.id}')" title="${escAttr(p.note)}">
      <div class="preset-name">${escHtml(p.name)}</div>
      <div class="preset-model">${escHtml(p.defaultModel)}</div>
      <div class="preset-note">${escHtml(p.note)}</div>
    </div>`;
  }
  list.innerHTML = html;
  overlay.style.display = 'flex';
}

function closePresetModal() {
  const overlay = document.getElementById('preset-overlay');
  if (overlay) overlay.style.display = 'none';
}

function applyPreset(id) {
  const preset = allPresets.find(p => p.id === id);
  if (!preset) return;

  // 填充所有字段（不覆盖用户已填的 API Key）
  const fields = {
    'ANTHROPIC_BASE_URL': preset.baseUrl,
    'ANTHROPIC_MODEL': preset.defaultModel,
    'ANTHROPIC_DEFAULT_OPUS_MODEL': preset.heavyModel,
    'ANTHROPIC_DEFAULT_SONNET_MODEL': preset.balancedModel,
    'ANTHROPIC_DEFAULT_HAIKU_MODEL': preset.lightModel,
    'CLAUDE_CODE_SUBAGENT_MODEL': preset.subagentModel,
  };

  for (const [key, val] of Object.entries(fields)) {
    const el = document.getElementById('env-' + key);
    if (el) el.value = val;
  }

  // 高亮选中的卡片
  document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('active-preset'));
  const card = document.querySelector(`.preset-card[onclick*="${id}"]`);
  if (card) card.classList.add('active-preset');

  showToast(`✅ 已套用 ${preset.name} 预设，请填写 API Key 后保存`);
  setTimeout(() => closePresetModal(), 400);
}

async function quitGame() {

  if (window.makoElectron && window.makoElectron.isElectron) {
    try { await fetch(`${API}/api/quit`, { method: 'POST' }); } catch {}
    window.close();
    return;
  }
  // 浏览器环境
  try {
    await fetch(`${API}/api/quit`, { method: 'POST' });
  } catch {}
  // 关闭当前标签页（浏览器中 window.close 只对脚本打开的窗口有效）
  const msg = 'MakoCode 已关闭。此窗口可以安全关闭。';
  document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#F5F0E8;font-family:sans-serif;font-size:20px;background:#1A1410">${msg}</div>`;

  }, 500);
}

// ===== 新建游戏 =====
async function newGame() {
  if (gameStarted) return;
  gameStarted = true;

  if (!serverOk) {
    const ok = await checkServer();
    if (!ok) { gameStarted = false; return; }
  }

  // 新存档 ID
  currentSaveId = crypto.randomUUID();
  sessionId = crypto.randomUUID();

  initAssets();
  document.getElementById('title-screen').classList.add('hidden');
  showGameUI();

  setTimeout(() => {
    setCharState('claude');
    startExprCycle('claude');
    setTimeout(async () => {
      // 打包版：从问候库随机选一条 + 播放预生成语音
      const { text, voiceUrl } = getRandomGreeting();
      setSpeaker('茉子');
      typeWrite(text);
      // 播放预生成问候语音（无需 TTS）
      if (voiceUrl) {
        try {
          const resp = await fetch(voiceUrl, { method: 'HEAD' });
          if (resp.ok) {
            const voiceId = 'greet_' + Date.now();
            playVoiceUrl(voiceUrl, voiceId);
            history.push({ speaker: '茉子', text, voiceId });
          } else {
            history.push({ speaker: '茉子', text });
          }
        } catch {
          history.push({ speaker: '茉子', text });
        }
      } else {
        history.push({ speaker: '茉子', text });
      }
      await new Promise(r => {
        const check = setInterval(() => { if (!isTyping) { clearInterval(check); r(); } }, 100);
      });
      renderHistory();
      setStatus('connected', '已连接');
      autoSave();
      document.getElementById('input-area').classList.add('show');
      document.getElementById('user-input').focus();
      resetInputHeight();
    }, 600);
  }, 400);
}

// ===== 继续存档 =====
async function loadGame(saveId) {
  if (gameStarted) return;

  if (!serverOk) {
    const ok = await checkServer();
    if (!ok) return;
  }

  try {
    const res = await fetch(`${API}/api/saves/${saveId}`);
    if (!res.ok) throw new Error('加载失败');
    const save = await res.json();

    currentSaveId = save.id;
    // 跨端口跳转时换新 sessionId，避免 DeepSeek 沿用旧模型
    sessionId = crypto.randomUUID();
    history = save.history || [];

    // 恢复最后一条有语音的消息的 voiceId（支持点击对话框重播）
    const lastWithVoice = [...history].reverse().find(h => h.voiceId);
    currentVoiceId = lastWithVoice ? lastWithVoice.voiceId : null;

    gameStarted = true;
    initAssets();
    document.getElementById('title-screen').classList.add('hidden');
    showGameUI();
    hideSaveList();

    // 恢复最后一条对话的状态（直接显示，不打字）
    setTimeout(async () => {
      if (history.length > 0) {
        renderHistory();
        const last = history[history.length - 1];
        const who = last.speaker === '茉子' || last.speaker === 'Claude' ? 'claude' : 'user';
        setSpeaker(last.speaker);
        setCharState(who);
        startExprCycle(who);
        // 直接显示最后一条消息，不使用打字机效果
        const plain = document.getElementById('dialogue-plain');
        const rendered = document.getElementById('dialogue-rendered');
        document.getElementById('text-content').textContent = last.text;
        document.getElementById('type-cursor').style.display = 'none';
        plain.style.display = 'block';
        rendered.style.display = 'none';
        renderMarkdown(last.text);
        document.getElementById('click-hint').style.display = 'block';
        isTyping = false;
        currentText = last.text;
        document.getElementById('input-area').classList.add('show');
        document.getElementById('user-input').focus();
        resetInputHeight();
      } else {
        // 空存档，AI 生成自然开场白
        setCharState('claude');
        startExprCycle('claude');
        showLoading();
        await chatWithClaude('（游戏开始了，请用你的风格自然地跟主人打个招呼吧~）', []);
      }
      setStatus('connected', '已连接');
      document.getElementById('volume-btn').style.display = 'block';
      updateMainVolIcon();
    }, 400);
  } catch (e) {
    showError('加载存档失败: ' + e.message);
  }
}

// ===== 自动存档 =====
async function autoSave() {
  if (history.length === 0) return;
  // 首次对话自动生成存档 ID，无需用户手动新建
  if (!currentSaveId) currentSaveId = crypto.randomUUID();
  const title = history.find(h => h.speaker === '主人')?.text?.slice(0, 30)
    || history[0]?.text?.slice(0, 30)
    || '无标题';
  try {
    await fetch(`${API}/api/saves`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: currentSaveId,
        sessionId,
        title,
        history,
      }),
    });
    // 显示存档已保存提示
    const toast = document.getElementById('save-toast');
    toast.classList.add('show');
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  } catch (e) {
    console.warn('[autoSave]', e);
  }
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}
function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ─── Mode Switcher ────────────────────────────────────────
let currentPermissionMode = 'default';
const MODE_ORDER = ['bypass', 'plan', 'acceptEdits', 'default'];
function initModeSwitcher() {
  const saved = localStorage.getItem('mako-permission-mode');
  if (saved && MODE_ORDER.includes(saved)) currentPermissionMode = saved;

  const indicator = document.getElementById('mode-indicator');
  const items = document.querySelectorAll('.mode-item');
  const tooltip = document.getElementById('mode-tooltip');
  const switcher = document.getElementById('mode-switcher');

  function updateUI() {
    const idx = MODE_ORDER.indexOf(currentPermissionMode);
    const item = items[idx];
    if (indicator && item && switcher) {
      // Use getBoundingClientRect() so positions are always in the same viewport-relative
      // coordinate system, regardless of different offsetParents. offsetTop would give
      // wrong results when item and switcher have different positioned ancestors.
      const swRect = switcher.getBoundingClientRect();
      const itemRect = item.getBoundingClientRect();
      indicator.style.top = (itemRect.top - swRect.top) + 'px';
    }
    items.forEach(el => el.classList.remove('active'));
    if (item) item.classList.add('active');
    localStorage.setItem('mako-permission-mode', currentPermissionMode);
  }

  // Click to switch
  items.forEach(item => {
    item.addEventListener('click', () => {
      const mode = item.dataset.mode;
      if (mode === currentPermissionMode) return;
      if (mode === 'bypass' && !localStorage.getItem('mako-auto-mode-confirmed')) {
        showAutoModeWarning(() => {
          localStorage.setItem('mako-auto-mode-confirmed', '1');
          currentPermissionMode = mode;
          updateUI();
          sendModeToServer(mode);
        });
        return;
      }
      currentPermissionMode = mode;
      updateUI();
      sendModeToServer(mode);
    });
  });

  // Hover tooltip with 300ms delay
  let tooltipTimer;
  items.forEach(item => {
    item.addEventListener('mouseenter', () => {
      const mode = item.dataset.mode;
      const descs = {
        bypass: '完全自主执行，适合沙箱/CI',
        plan: '纯只读模式，不能修改文件',
        acceptEdits: '文件读写自动通过，Shell仍需确认',
        default: '每步确认，最安全'
      };
      tooltipTimer = setTimeout(() => {
        if (tooltip) { tooltip.textContent = descs[mode]; tooltip.classList.add('visible'); }
      }, 300);
    });
    item.addEventListener('mouseleave', () => {
      clearTimeout(tooltipTimer);
      if (tooltip) tooltip.classList.remove('visible');
    });
  });

  // Drag on the switcher container
  let dragging = false;
  if (switcher) {
    switcher.addEventListener('mousedown', (e) => {
      dragging = true; e.preventDefault();
    });
  }
  document.addEventListener('mousemove', (e) => {
    if (!dragging || !switcher) return;
    const rect = switcher.getBoundingClientRect();
    const itemHeight = 42;
    const relY = e.clientY - rect.top - 4;
    let idx = Math.round(relY / itemHeight);
    idx = Math.max(0, Math.min(3, idx));
    const newMode = MODE_ORDER[idx];
    if (newMode !== currentPermissionMode) {
      if (newMode === 'bypass' && !localStorage.getItem('mako-auto-mode-confirmed')) {
        dragging = false;
        showAutoModeWarning(() => {
          localStorage.setItem('mako-auto-mode-confirmed', '1');
          currentPermissionMode = newMode;
          updateUI();
          sendModeToServer(newMode);
        });
        return;
      }
      currentPermissionMode = newMode;
      updateUI();
      sendModeToServer(newMode);
    }
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  // Keyboard shortcut: Ctrl+Shift+M
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'M') {
      e.preventDefault();
      const idx = MODE_ORDER.indexOf(currentPermissionMode);
      const next = (idx + 1) % 4;
      currentPermissionMode = MODE_ORDER[next];
      updateUI();
      sendModeToServer(currentPermissionMode);
    }
  });

  // Triple guarantee for capsule positioning:
  // (1) Double rAF waits for render pipeline to settle
  // (2) setTimeout(100ms) catches cases where layout is slower than 2 frames
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { updateUI(); });
  });
  setTimeout(() => { updateUI(); }, 100);
  // Expose for showGameUI() (which is called later when the container becomes visible)
  window.__updateModeUI = updateUI;
  // 初始化时同步模式到服务器（否则 localStorage 恢复的模式与服务器不一致）
  sendModeToServer(currentPermissionMode);
}

function showGameUI() {
  const statusBar = document.getElementById('status-bar');
  const modeSwitcher = document.getElementById('mode-switcher-container');
  if (statusBar) statusBar.classList.add('visible');
  if (modeSwitcher) {
    modeSwitcher.classList.add('visible');
    // Now that the switcher is visible, recalculate capsule position.
    // Double rAF ensures the browser has laid out the newly visible elements
    // before getBoundingClientRect() is called.
    if (window.__updateModeUI) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => window.__updateModeUI());
      });
    }
  }
}

function sendModeToServer(mode) {
  fetch(`${API}/api/mode`, {

    headers: { 'Content-Type': 'application/json' },

}

}

// Initialize mode switcher on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initModeSwitcher);
} else {
  initModeSwitcher();
}
</script>
